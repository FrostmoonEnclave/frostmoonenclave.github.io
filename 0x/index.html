<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#202124" media="(prefers-color-scheme: dark)">
    <title>𝗣𝗿𝗲𝗳𝗶𝘅 𝗦𝘁𝘂𝗱𝗶𝗼 - HEX Encoder / Decoder</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Theme Logic 
        (function() {
            const savedClass = localStorage.getItem('selectedThemeClass');
            if (savedClass) document.body.classList.add(savedClass);
            
            const darkMode = localStorage.getItem('darkMode');
            if (darkMode === 'enabled') {
                document.documentElement.classList.add('dark');
            }
        })();

        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        themePrimary: 'var(--theme-primary)',
                        themeDark: 'var(--theme-dark)',
                        themeHover: 'var(--theme-hover)',
                        themeHeaderDark: 'var(--theme-header-dark)',
                        themeBgDark: 'var(--theme-bg-dark)',
                        themeTextOutDark: 'var(--theme-textout-dark)',
                        themeTextBtn: 'var(--theme-text-btn)',
                        themeTextBtnDark: 'var(--theme-text-btn-dark)',
                        themeBgBtnDark: 'var(--theme-bg-btn-dark)',
                    }
                }
            }
        }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Roboto:wght@400;500&family=Roboto+Mono&family=Playwrite+IE&family=Inter:wght@400;700&family=Lexend:wght@400;700&family=Space+Mono&family=Pacifico&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --theme-primary: #698ae8;
            --theme-dark: #8ab4f8;
            --theme-bg-dark: #090d16;
            --theme-header-dark: #131c30;
            --theme-textout-dark: #0d1424;
            --theme-bg-btn-dark: #8ab4f8;
            --theme-text-btn-dark: #090d16;
            --theme-hover: rgba(26, 115, 232, 0.1);
        }

        body { font-family: 'Roboto', sans-serif; }
        .google-sans { font-family: 'Google Sans', sans-serif; }
        .mono { font-family: 'Roboto Mono', monospace; }
        .font-playwrite { font-family: 'Playwrite IE', cursive; }
        .font-pacifico { font-family: 'Pacifico', cursive; }
        .font-noto-sans-sc { font-family: 'Noto Sans SC', sans-serif; }
        
        /* Focus states */
        textarea:focus { box-shadow: inset 0 -2px 0 0 var(--theme-primary); }
        .dark textarea:focus { box-shadow: inset 0 -2px 0 0 var(--theme-dark); }
        
        /* Hide scrollbars for cleaner UI*/
        textarea::-webkit-scrollbar { width: 6px; }
        textarea::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>

    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='transparent'/><text x='50%' y='50%' dominant-baseline='central' text-anchor='middle' fill='%23698ae8' font-family='monospace' font-weight='bold' font-size='32'>❂</text></svg>">
</head>

<body class="text-[#202124] bg-[#f8f9fa] dark:bg-themeBgDark dark:text-gray-100 antialiased transition-colors duration-300">

    <header class="bg-white dark:bg-themeHeaderDark border-b border-gray-200 dark:border-[#2d3321] sticky top-0 z-40 transition-colors">
        <div class="max-w-6xl mx-auto flex items-center justify-between px-6 py-3">
            <div class="flex items-center gap-3">
                <div onclick="nextTheme()" class="w-9 h-9 rounded-lg flex items-center justify-center cursor-pointer hover:scale-110 transition-transform active:scale-95">
                    <img id="sticker-img" src="./root/media/FurinaStatic.png" alt="Theme Toggle" class="w-full h-full object-contain">
                </div>
                <h1 class="google-sans text-xl font-medium tracking-tight text-[#5f6368] dark:text-gray-300">
                    0x<span class="text-themePrimary dark:text-themeDark font-bold">Studio</span>
                </h1>
            </div>
            
            <div class="flex items-center gap-2 md:gap-4">
                <button onclick="changeFont()" class="p-2 justify-center hover:bg-gray-100 dark:hover:bg-gray-700 rounded-full transition-colors" title="Change Font">
                    <svg class='w-5 h-5 dark:fill-white' xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='transparent'/><text x='50%' y='50%' class='w-5 h-5 dark:fill-white font-noto-sans-sc font-extrabold' dominant-baseline='central' text-anchor='middle' font-size='28'>A</text></svg>
                </button>
                <button onclick="toggleDarkMode()" class="p-2 text-gray-500 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-full transition-colors" title="Toggle Dark Mode">
                       <svg id="moonIcon" class="w-5 h-5 block dark:hidden" xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='transparent'/><text x='50%' y='50%' class='w-5 h-5 block dark:hidden dark:fill-white font-noto-sans-sc' dominant-baseline='central' text-anchor='middle' font-size='28'>暗</text></svg>
                       <svg id="sunIcon" class="w-5 h-5 hidden dark:block" xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='transparent'/><text x='50%' y='50%' class='w-5 h-5 hidden dark:block dark:fill-white font-noto-sans-sc' dominant-baseline='central' text-anchor='middle' font-size='28'>光</text></svg>
                </button>
                <button onclick="clearAll()" class="google-sans font-medium text-sm text-themePrimary dark:text-themeDark hover:bg-themeHover dark:hover:bg-gray-800 px-4 py-2 rounded-full transition-colors">Clear</button>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-4 md:p-8">
        <div class="flex flex-col md:flex-row items-center justify-between mb-8 gap-4">
            <div class="flex items-center bg-[#eef3fc] dark:bg-[#202124] p-1 rounded-full border border-[#d2e3fc] dark:border-gray-700 transition-colors">
                <button id="modeTextToHex" onclick="setMode(true)" class="px-6 py-2 rounded-full text-sm font-medium transition-all bg-themePrimary dark:bg-themeBgBtnDark text-white shadow-sm">
                    Text to Hex
                </button>
                <button id="modeHexToText" onclick="setMode(false)" class="px-6 py-2 rounded-full text-sm font-medium transition-all hover:bg-themeHover dark:text-gray-400 dark:hover:text-white">
                    Hex to Text
                </button>
            </div>
            
            <div class="text-sm text-[#5f6368] dark:text-gray-400 google-sans flex items-center gap-3">
                <span id="statusMsg">Live Conversion Active</span>
                <video id="indicator" autoplay loop muted playsinline class="rounded-lg aspect-video w-16 object-cover shadow-sm transition-all">
                    <source src="./root/media/IndicatorFurina.webm" type="video/webm">
                </video>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-px bg-gray-200 dark:bg-gray-800 border border-gray-200 dark:border-gray-800 rounded-2xl overflow-hidden shadow-xl">
            
            <div class="bg-white dark:bg-[#202124] p-6 transition-colors">
                <div class="flex items-center justify-between mb-4">
                    <label class="google-sans text-xs font-bold uppercase tracking-widest text-[#5f6368] dark:text-gray-500" id="inputLabel">Source Text</label>
                    <div class="flex items-center gap-3">
                        <input type="file" id="fileInput" accept=".txt" class="hidden" onchange="handleFileUpload(event)">
                        <button onclick="document.getElementById('fileInput').click()" class="text-gray-400 hover:text-themePrimary dark:hover:text-themeDark transition-colors" title="Upload File">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                        </button>
                        <span class="google-sans text-xs text-gray-400 uppercase font-bold" id="inputFormat">UTF-8</span>
                    </div>
                </div>
                <textarea id="inputArea" oninput="convert()" 
                    class="w-full h-64 md:h-96 p-0 text-lg bg-transparent border-none outline-none resize-none placeholder-gray-300 dark:placeholder-gray-700 text-[#202124] dark:text-gray-100"
                    placeholder="Paste, type, or upload a file here..."></textarea>
            </div>

            <div class="bg-[#fbfcfa] dark:bg-themeTextOutDark p-6 transition-colors">
                <div class="flex items-center justify-between mb-4">
                    <div class="flex items-center gap-2">
                        <label class="google-sans text-xs font-bold uppercase tracking-widest text-[#5f6368] dark:text-gray-500" id="outputLabel">Hexadecimal</label>
                        <select id="delimiter" onchange="convert()" class="google-sans text-[11px] bg-transparent font-bold uppercase text-themePrimary dark:text-themeDark outline-none cursor-pointer border border-[#d8e8b5] dark:border-gray-700 rounded px-2 py-0.5">
                            <option value=" ">Space</option>
                            <option value="">None</option>
                            <option value=",">Comma</option>
                        </select>
                    </div>
                    <div class="flex items-center gap-2">
                        <button onclick="downloadOutput()" class="text-gray-400 hover:text-themePrimary dark:hover:text-themeDark p-1 transition-colors" title="Download Output">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                        </button>
                        <button onclick="copyOutput()" class="flex items-center gap-1 text-themePrimary dark:text-themeDark hover:bg-[#f0f4e8] dark:hover:bg-gray-800 px-3 py-1.5 rounded-full transition-all" title="Copy to Clipboard">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M8 7v8a2 2 0 002 2h6M8 7V5a2 2 0 012-2h4.586a1 1 0 01.707.293l4.414 4.414a1 1 0 01.293.707V15a2 2 0 01-2 2h-2M8 7H6a2 2 0 00-2 2v10a2 2 0 002 2h8a2 2 0 002-2v-2"></path></svg>
                        </button>
                    </div>
                </div>
                <textarea id="outputArea" readonly 
                    class="mono w-full h-64 md:h-96 p-0 text-lg bg-transparent border-none outline-none resize-none text-themePrimary dark:text-themeDark font-medium"
                    placeholder="Result will appear here..."></textarea>
            </div>
        </div>
    </main>

    <div id="toast" class="google-sans fixed bottom-8 left-1/2 -translate-x-1/2 bg-[#323232] dark:bg-white text-white dark:text-[#323232] px-6 py-3 rounded-xl text-sm font-medium transition-all duration-300 opacity-0 translate-y-10 pointer-events-none shadow-2xl z-50">
        Action completed
    </div>

    <script src="./root/script/themes.js"></script>
    <script src="./root/script/main.js"></script>
</body>
</html>
