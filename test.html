<!DOCTYPE html>
<html>
<body>
    <h2>Store and Persist Image</h2>
    <input type="file" id="fileInput" accept="image/*">
    <div id="status"></div>
    <img id="preview" style="max-width: 300px; display: block; margin-top: 10px;">

    <script>
        const dbName = "FileStorageDB";
        const storeName = "files";
        const fileKey = "savedImage";

        // 1. Initialize/Open Database
        const request = indexedDB.open(dbName, 1);

        request.onupgradeneeded = (e) => {
            const db = e.target.result;
            if (!db.objectStoreNames.contains(storeName)) {
                db.createObjectStore(storeName); // Create store if it doesn't exist
            }
        };

        request.onsuccess = (e) => {
            const db = e.target.result;
            loadFromDB(db); // Automatically load image on page start

            // 2. Handle File Upload and Save
            document.getElementById('fileInput').onchange = (event) => {
                const file = event.target.files[0];
                if (!file) return;

                const transaction = db.transaction(storeName, "readwrite");
                transaction.objectStore(storeName).put(file, fileKey);

                transaction.oncomplete = () => {
                    document.getElementById('status').innerText = "Saved successfully!";
                    displayImage(file);
                };
            };
        };

        // 3. Load from Storage
        function loadFromDB(db) {
            const transaction = db.transaction(storeName, "readonly");
            const request = transaction.objectStore(storeName).get(fileKey);

            request.onsuccess = () => {
                if (request.result) {
                    displayImage(request.result);
                    document.getElementById('status').innerText = "Loaded from storage.";
                }
            };
        }

        function displayImage(blob) {
            const url = URL.createObjectURL(blob);
            document.getElementById('preview').src = url;
        }
    </script>
</body>
</html>
